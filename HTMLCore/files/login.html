<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Secure Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: #1e1e2e;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.12);
      --text: #e8e6e0;
      --muted: #6b6879;
      --error: #e07070;
      --success: #70c9a0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(201,169,110,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(100,80,180,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-mark {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo-mark .symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      margin-bottom: 0.75rem;
      background: var(--accent-dim);
      box-shadow: 0 0 32px rgba(201,169,110,0.12);
    }
    .logo-mark h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .logo-mark p {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.4rem;
    }
    .card .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
    }
    input::placeholder { color: #3a3848; }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      margin-top: 0.25rem;
    }
    .remember-row label {
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.84rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      margin: 0;
    }
    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .forgot { font-size: 0.84rem; color: var(--accent); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #c9a96e, #a07840);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-note {
      text-align: center;
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    .msg-box {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .msg-box.error { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); color: var(--error); display: block; }
    .msg-box.success { background: rgba(112,201,160,0.1); border: 1px solid rgba(112,201,160,0.3); color: var(--success); display: block; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <div class="logo-mark">
      <div class="symbol">S</div>
      <h1>SecurePortal</h1>
      <p>Authentication System</p>
    </div>

    <div class="card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>

      <div class="msg-box error" id="errorMsg" style="display:none;">
        &#x26A0; Invalid username or password. Please try again.
      </div>
      <div class="msg-box success" id="successMsg" style="display:none;">
        &#x2713; You have been signed out successfully.
      </div>

      <form action="LoginServlet" method="post">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <div class="remember-row">
          <label>
            <input type="checkbox" name="remember"/> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="divider">or</div>
      <div class="footer-note">
        Don't have an account? <a href="#">Request access</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('errorMsg').style.display = 'block';
    }
    if (params.get('logout') === 'success') {
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
